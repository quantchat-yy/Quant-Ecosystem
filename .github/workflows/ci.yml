name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Hard gate: packages affected by this change must pass.
  # Pre-existing failures elsewhere in the repo do not block.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve change base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "filter=...[origin/${{ github.base_ref }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=...[HEAD~1]" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck, lint, test changed packages
        run: npx turbo typecheck lint test --concurrency=3 --continue --filter='${{ steps.base.outputs.filter }}'

  # Informational full sweep: tracks repo-wide health without blocking merges.
  # Make this required once the pre-existing failure backlog is cleared.
  full-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full typecheck + lint + test
        run: npx turbo typecheck lint test --concurrency=3 --continue
