version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant_secret
      POSTGRES_DB: quantdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quant']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: quant_meili_key
    ports:
      - '7700:7700'
    volumes:
      - meili_data:/meili_data
    networks:
      - quant-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - quant-network

volumes:
  postgres_data:
  redis_data:
  meili_data:
  qdrant_data:

networks:
  quant-network:
    driver: bridge
