global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'quantmail'
    static_configs:
      - targets: ['quantmail:3010']
    metrics_path: /metrics

  - job_name: 'quantchat'
    static_configs:
      - targets: ['quantchat:3015']
    metrics_path: /metrics

  - job_name: 'quantai'
    static_configs:
      - targets: ['quantai:3020']
    metrics_path: /metrics

  - job_name: 'admin'
    static_configs:
      - targets: ['admin:3100']
    metrics_path: /metrics

  - job_name: 'ws-gateway'
    static_configs:
      - targets: ['ws-gateway:8080']
    metrics_path: /metrics
