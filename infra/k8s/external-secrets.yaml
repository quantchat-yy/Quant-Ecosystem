apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quant-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: quant-secret-store
    kind: SecretStore
  target:
    name: quant-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: quant/postgres
        property: password
    - secretKey: jwt-secret
      remoteRef:
        key: quant/jwt
        property: secret
    - secretKey: openai-api-key
      remoteRef:
        key: quant/openai
        property: api-key
    - secretKey: anthropic-api-key
      remoteRef:
        key: quant/anthropic
        property: api-key
    - secretKey: meili-master-key
      remoteRef:
        key: quant/meilisearch
        property: master-key
    - secretKey: grafana-admin-password
      remoteRef:
        key: quant/grafana
        property: admin-password
