openapi: 3.0.3
info:
  title: QuantMail API
  description: Email platform with AI-powered features, Git integration, and infrastructure services.
  version: 1.0.0
  contact:
    name: Quant Ecosystem
servers:
  - url: /api/v1
    description: QuantMail API server

tags:
  - name: Auth
    description: Authentication and registration
  - name: OAuth
    description: OAuth 2.0 / OpenID Connect
  - name: Emails
    description: Email CRUD and operations
  - name: Email AI
    description: AI-powered email features (summarize, compose, classify, phishing detection)
  - name: Threads
    description: Email thread management
  - name: Folders
    description: Email folder management
  - name: Contacts
    description: Contact management
  - name: Labels
    description: Email label management
  - name: AI Services
    description: Advanced AI services (triage, reply, summarize, compose, tone, style, etc.)
  - name: Infrastructure
    description: Aliases, disposable emails, tracker stripping, PGP, undo-send
  - name: AI DevTools
    description: AI-powered developer tools (code review, commit messages, PR descriptions, etc.)
  - name: Repositories
    description: Git repository management
  - name: Issues
    description: Issue tracking
  - name: Pull Requests
    description: Pull request management
  - name: Reviews
    description: Code review and comments
  - name: CI
    description: CI/CD pipeline management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: Validation failed
            statusCode:
              type: integer
              example: 400

    SuccessWrapper:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    User:
      type: object
      properties:
        id:
          type: string
          example: usr_abc123
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: johndoe
        displayName:
          type: string
          example: John Doe

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            userId:
              type: string
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer
            user:
              $ref: '#/components/schemas/User'

    Email:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        subject:
          type: string
        bodyHtml:
          type: string
        bodyPlain:
          type: string
        from:
          type: string
        toAddresses:
          type: array
          items:
            type: string
        isRead:
          type: boolean
        isStarred:
          type: boolean
        folderId:
          type: string
        labels:
          type: array
          items:
            type: string
        receivedAt:
          type: string
          format: date-time
        category:
          type: string

    Folder:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [INBOX, SENT, DRAFTS, SPAM, TRASH, ARCHIVE, CUSTOM]
        color:
          type: string
        icon:
          type: string

    Contact:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatar:
          type: string
          format: uri

    Repository:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [PUBLIC, PRIVATE, INTERNAL]
        defaultBranch:
          type: string
        ownerId:
          type: string

    Issue:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        title:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [OPEN, CLOSED]
        labels:
          type: array
          items:
            type: string
        assignees:
          type: array
          items:
            type: string
        authorId:
          type: string
        repoId:
          type: string

    PullRequest:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        title:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [OPEN, MERGED, CLOSED, DRAFT]
        headBranch:
          type: string
        baseBranch:
          type: string
        authorId:
          type: string
        repoId:
          type: string

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: '********'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                displayName:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /oauth/token:
    post:
      tags: [OAuth]
      summary: Exchange authorization code or refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                code:
                  type: string
                refresh_token:
                  type: string
                client_id:
                  type: string
                code_verifier:
                  type: string
                redirect_uri:
                  type: string
      responses:
        '200':
          description: Token pair returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
        '400':
          description: Invalid grant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /oauth/revoke:
    post:
      tags: [OAuth]
      summary: Revoke a token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /oauth/authorize:
    get:
      tags: [OAuth]
      summary: Authorization endpoint (returns consent HTML or redirects)
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: scope
          in: query
          schema:
            type: string
            example: openid profile email
        - name: state
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Consent page HTML or redirect
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /oauth/consent:
    post:
      tags: [OAuth]
      summary: Submit OAuth consent decision
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, client_id, redirect_uri, user_id, scope]
              properties:
                action:
                  type: string
                  enum: [approve, deny]
                client_id:
                  type: string
                redirect_uri:
                  type: string
                user_id:
                  type: string
                scope:
                  type: string
                state:
                  type: string
      responses:
        '302':
          description: Redirect with authorization code or error

  /oauth/register:
    post:
      tags: [OAuth]
      summary: Register a new OAuth client
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, redirect_uris]
              properties:
                name:
                  type: string
                redirect_uris:
                  type: array
                  items:
                    type: string
                scopes:
                  type: array
                  items:
                    type: string
                is_confidential:
                  type: boolean
      responses:
        '200':
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
                    nullable: true
                  name:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /.well-known/openid-configuration:
    get:
      tags: [OAuth]
      summary: OpenID Connect discovery document
      security: []
      responses:
        '200':
          description: OpenID configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  revocation_endpoint:
                    type: string
                  registration_endpoint:
                    type: string
                  jwks_uri:
                    type: string
                  response_types_supported:
                    type: array
                    items:
                      type: string
                  grant_types_supported:
                    type: array
                    items:
                      type: string

  /.well-known/jwks.json:
    get:
      tags: [OAuth]
      summary: JSON Web Key Set
      security: []
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object

  /oauth/userinfo:
    get:
      tags: [OAuth]
      summary: Get authenticated user info
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails:
    post:
      tags: [Emails]
      summary: Compose and optionally send an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toAddresses, subject]
              properties:
                toAddresses:
                  type: array
                  items:
                    type: string
                    format: email
                ccAddresses:
                  type: array
                  items:
                    type: string
                    format: email
                bccAddresses:
                  type: array
                  items:
                    type: string
                    format: email
                subject:
                  type: string
                  maxLength: 500
                bodyHtml:
                  type: string
                bodyPlain:
                  type: string
                threadId:
                  type: string
                inReplyTo:
                  type: string
                send:
                  type: boolean
                sentFolderId:
                  type: string
      responses:
        '201':
          description: Email created (and optionally sent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [Emails]
      summary: List emails with pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: folderId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated email list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Email'
                  emails:
                    type: array
                    items:
                      $ref: '#/components/schemas/Email'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalPages:
                    type: integer
                  totalCount:
                    type: integer
                  unreadCount:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/search:
    get:
      tags: [Emails]
      summary: Search emails
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}:
    get:
      tags: [Emails]
      summary: Get email by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Emails]
      summary: Soft-delete an email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/read:
    post:
      tags: [Emails]
      summary: Mark email as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/star:
    post:
      tags: [Emails]
      summary: Toggle star on email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Star toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/move:
    post:
      tags: [Emails]
      summary: Move email to folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folderId]
              properties:
                folderId:
                  type: string
      responses:
        '200':
          description: Email moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/summarize:
    post:
      tags: [Email AI]
      summary: Summarize an email using AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/compose-assist:
    post:
      tags: [Email AI]
      summary: AI-assisted email composition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instructions]
              properties:
                instructions:
                  type: string
                  maxLength: 2000
                context:
                  type: object
                  properties:
                    recipient:
                      type: string
                    subject:
                      type: string
                    tone:
                      type: string
      responses:
        '200':
          description: Composed email draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/classify-priority:
    post:
      tags: [Email AI]
      summary: Classify email priority using AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Priority classification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/detect-phishing:
    post:
      tags: [Email AI]
      summary: Detect phishing in an email using AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Phishing detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /emails/{id}/reply-suggestions:
    get:
      tags: [Email AI]
      summary: Get AI-generated reply suggestions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reply suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /threads:
    get:
      tags: [Threads]
      summary: List email threads
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: folderId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Thread list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /threads/{id}:
    get:
      tags: [Threads]
      summary: Get a thread by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thread details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /folders:
    post:
      tags: [Folders]
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                type:
                  type: string
                  enum: [INBOX, SENT, DRAFTS, SPAM, TRASH, ARCHIVE, CUSTOM]
                color:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Folder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [Folders]
      summary: List all folders
      responses:
        '200':
          description: Folder list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /folders/{id}:
    put:
      tags: [Folders]
      summary: Update a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 100
                color:
                  type: string
                icon:
                  type: string
      responses:
        '200':
          description: Folder updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Folders]
      summary: Delete a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Folder deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /contacts:
    post:
