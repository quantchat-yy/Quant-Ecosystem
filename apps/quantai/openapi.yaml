openapi: 3.0.3
info:
  title: QuantAI API
  description: AI platform with agents, orchestration, memory, tools, ML pipelines, and cross-app coordination.
  version: 1.0.0
  contact:
    name: Quant Ecosystem
servers:
  - url: /api/v1
    description: QuantAI API server

tags:
  - name: Health
    description: System health and readiness
  - name: QuantOS
    description: QuantOS agent registry and status
  - name: Agentic
    description: Agent execution and workflows
  - name: Analytics
    description: Agent analytics and stats
  - name: Swarm
    description: Agent swarm management
  - name: Orchestration
    description: Cross-app orchestration
  - name: Personal Agent
    description: Personal AI agent
  - name: Agents
    description: Agent marketplace
  - name: ML
    description: ML model training and jobs
  - name: Tools
    description: Tool execution
  - name: Agent Health
    description: Agent health monitoring
  - name: Agent Logs
    description: Agent log management
  - name: Versioning
    description: Agent version management
  - name: Usage
    description: Usage stats and billing
  - name: Cache
    description: Cache management
  - name: Chat
    description: AI chat sessions
  - name: Voice
    description: Voice interface (TTS/STT)
  - name: Federation
    description: Federated agent network
  - name: Moderation
    description: Content moderation
  - name: Templates
    description: Prompt/workflow templates
  - name: AB Testing
    description: A/B testing experiments
  - name: Sessions
    description: Chat session management
  - name: Events
    description: Event pipeline
  - name: Marketplace
    description: Agent marketplace (v2)
  - name: Recommendations
    description: Content recommendations
  - name: Memory
    description: Unified memory system
  - name: CDN
    description: CDN management
  - name: Permissions
    description: Agent permission management
  - name: Scaling
    description: Auto-scaling policies
  - name: Payments
    description: Payment processing
  - name: Training
    description: Agent training
  - name: Ask
    description: Single-shot AI Q&A
  - name: Collaboration
    description: Multi-agent collaboration

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Invalid request body
            statusCode:
              type: integer
              example: 400

    SuccessWrapper:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: System health check
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 2.0.0-agentic
                  agents:
                    type: object
                    properties:
                      count:
                        type: integer
                      active:
                        type: array
                        items:
                          type: string
                  features:
                    type: array
                    items:
                      type: string

  /ready:
    get:
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    example: false
                  missing:
                    type: array
                    items:
                      type: string

  /quantos/agents:
    get:
      tags: [QuantOS]
      summary: List active agents
      security: []
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        capabilities:
                          type: array
                          items:
                            type: string
                  total:
                    type: integer

  /quantos/status:
    get:
      tags: [QuantOS]
      summary: System status
      security: []
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  agents:
                    type: integer
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string

  /agentic/agents/run:
    post:
      tags: [Agentic]
      summary: Run a specific agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, input]
              properties:
                agentId:
                  type: string
                input:
                  type: string
                context:
                  type: object
      responses:
        '200':
          description: Agent result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Agent error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agentic/workflows:
    post:
      tags: [Agentic]
      summary: Create and execute a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, goal]
              properties:
                name:
                  type: string
                goal:
                  type: string
      responses:
        '200':
          description: Workflow executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  workflow:
                    type: object
                  results:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Workflow error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [Agentic]
      summary: List user workflows
      responses:
        '200':
          description: Workflow list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /analytics/agents/top:
    get:
      tags: [Analytics]
      summary: Get top performing agents
      security: []
      responses:
        '200':
          description: Top agents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /analytics/agents/{id}/stats:
    get:
      tags: [Analytics]
      summary: Get agent stats
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent stats
          content:
            application/json:
              schema:
                type: object
        '404':
          description: No stats found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /swarm:
    post:
      tags: [Swarm]
      summary: Form an agent swarm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, agents, goal]
              properties:
                name:
                  type: string
                agents:
                  type: array
                  items:
                    type: string
                  minItems: 2
                goal:
                  type: string
      responses:
        '200':
          description: Swarm formed
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Swarm error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /swarm/{id}/activate:
    post:
      tags: [Swarm]
      summary: Activate a swarm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Swarm activated
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Swarm error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /swarm/{id}:
    get:
      tags: [Swarm]
      summary: Get swarm details
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Swarm details
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Swarm not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orchestrate/summarize-day:
    post:
      tags: [Orchestration]
      summary: Summarize the user's day across apps
      responses:
        '200':
          description: Day summary
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orchestrate/draft-reply:
    post:
      tags: [Orchestration]
      summary: Draft a cross-app reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emailId]
              properties:
                emailId:
                  type: string
      responses:
        '200':
          description: Drafted reply
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orchestrate/schedule-meeting:
    post:
      tags: [Orchestration]
      summary: Schedule a meeting across apps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, attendees, preferredTime]
              properties:
                title:
                  type: string
                attendees:
                  type: array
                  items:
                    type: string
                preferredTime:
                  type: string
      responses:
        '200':
          description: Meeting scheduled
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orchestrate/search-and-summarize:
    post:
      tags: [Orchestration]
      summary: Search across apps and summarize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
      responses:
        '200':
          description: Search results summary
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orchestrate/chat-followup:
    post:
      tags: [Orchestration]
      summary: Chat follow-up from conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId]
              properties:
                conversationId:
                  type: string
      responses:
        '200':
          description: Follow-up result
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /personal-agent:
    post:
      tags: [Personal Agent]
      summary: Send input to personal agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: string
      responses:
        '200':
          description: Agent result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Agent error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /personal-agent/context:
    get:
      tags: [Personal Agent]
      summary: Get personal agent context
      responses:
        '200':
          description: Agent context
          content:
            application/json:
              schema:
                type: object
                properties:
                  context:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agents/marketplace:
    get:
      tags: [Agents]
      summary: List marketplace agents
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Get a specific agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'

  /agents/install:
    post:
      tags: [Agents]
      summary: Install an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId]
              properties:
                agentId:
                  type: string
      responses:
        '201':
          description: Agent installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agents/{id}/uninstall:
    delete:
      tags: [Agents]
      summary: Uninstall an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent uninstalled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agents:
    post:
      tags: [Agents]
      summary: Create a custom agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description, version, capabilities, systemPrompt, tools]
              properties:
                name:
                  type: string
                  maxLength: 100
                description:
                  type: string
                  maxLength: 1000
                version:
                  type: string
                capabilities:
                  type: array
                  items:
                    type: string
                systemPrompt:
                  type: string
                  maxLength: 10000
                tools:
                  type: array
                  items:
                    type: string
                modelPreference:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ml/models:
    get:
      tags: [ML]
      summary: List ML models
      security: []
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /ml/train:
    post:
      tags: [ML]
      summary: Start ML training job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modelName:
                  type: string
                dataset:
                  type: object
      responses:
        '200':
          description: Training job started
          content:
            application/json:
              schema:
                type: object
        '500':
          description: ML error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ml/jobs/{id}:
    get:
      tags: [ML]
      summary: Get training job status
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tools:
    get:
      tags: [Tools]
      summary: List available tools
      responses:
        '200':
          description: Tool list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tools/{name}/execute:
    post:
      tags: [Tools]
      summary: Execute a tool
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [args]
              properties:
                args:
                  type: object
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agent-health:
    get:
      tags: [Agent Health]
      summary: Get all agent health data
      security: []
      responses:
        '200':
          description: Health data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /agent-health/{id}:
    get:
      tags: [Agent Health]
      summary: Get specific agent health
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Health data
          content:
            application/json:
              schema:
                type: object
        '404':
          description: No health data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agent-logs:
    get:
      tags: [Agent Logs]
      summary: Get agent logs
      security: []
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    delete:
      tags: [Agent Logs]
      summary: Clear agent logs
      security: []
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Logs cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /versioning/agents/{id}/versions:
    get:
      tags: [Versioning]
      summary: Get agent versions
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /versioning/agents/{id}/latest:
    get:
      tags: [Versioning]
      summary: Get latest agent version
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest version
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: object
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usage:
    get:
      tags: [Usage]
      summary: Get usage statistics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
      responses:
        '200':
          description: Usage data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usage/billing:
    get:
      tags: [Usage]
      summary: Get billing info
      responses:
        '200':
          description: Billing info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWrapper'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cache/stats:
    get:
      tags: [Cache]
      summary: Get cache statistics
      security: []
      responses:
        '200':
          description: Cache stats
          content:
            application/json:
              schema:
                type: object

  /cache/clear:
    post:
      tags: [Cache]
      summary: Clear all cache
      security: []
      responses:
        '200':
          description: Cache cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /cache/{key}:
    delete:
      tags: [Cache]
      summary: Delete a cache entry
      security: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /chat/{id}/messages:
    post:
      tags: [Chat]
      summary: Send a message to AI chat session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 100000
                model:
                  type: string
                  example: gpt-4o
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                useAgent:
                  type: boolean
                agentId:
                  type: string
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  model:
                    type: string
                  usage:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: AI/Agent error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

